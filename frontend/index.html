<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Misinformation Analyzer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-glow"></div>
    <div class="container">
        <header>
            <h1>Truth<span class="highlight">Lens</span></h1>
            <p>AI-Powered Misinformation & Fake News Detection</p>
        </header>

        <main>
            <section class="analyzer-section">
                <div class="glass-panel">
                    <textarea id="text-input" placeholder="Paste an article, news headline, or claim to analyze its authenticity..." rows="6"></textarea>
                    <button id="analyze-btn" class="btn-primary">
                        <span class="btn-text">Analyze Content</span>
                        <div class="loader hidden"></div>
                    </button>
                </div>
            </section>

            <section id="result-section" class="result-section hidden">
                <div class="glass-panel result-card" id="result-card">
                    <div class="result-header">
                        <div class="label-badge" id="result-label">REAL</div>
                        <div class="confidence-ring">
                            <svg viewBox="0 0 36 36" class="circular-chart">
                                <path class="circle-bg"
                                    d="M18 2.0845
                                    a 15.9155 15.9155 0 0 1 0 31.831
                                    a 15.9155 15.9155 0 0 1 0 -31.831"
                                />
                                <path class="circle"
                                    id="confidence-circle"
                                    stroke-dasharray="0, 100"
                                    d="M18 2.0845
                                    a 15.9155 15.9155 0 0 1 0 31.831
                                    a 15.9155 15.9155 0 0 1 0 -31.831"
                                />
                            </svg>
                            <span id="confidence-val">0%</span>
                        </div>
                    </div>
                    <div class="explanation-box">
                        <h3>Analysis Explanation</h3>
                        <p id="result-explanation">Explanation goes here...</p>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
